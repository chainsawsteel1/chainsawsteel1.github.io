<!DOCTYPE html>

<html lang="ja-JP">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Home - chAIns's Website">
    <meta property="og:description" content="Top Page">
    <meta property="og:site_name" content="chAIns's Website - 相互リンク募集中">
    <meta property="og:url" content="https://chainsawsteel1.github.io">
    <meta property="og:locale" content="ja_JP" />
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&family=Roboto&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="/main.js"></script>
    <title>Home - chAIns's Website</title>
</head>

<script>
    function sample() {
        return $.ajax({
            type: "GET",
            url: $(location).attr('search'),
            cache: false,
        })
    }

    sample().done(function (data, status, xhr) {
        $('.h404').removeClass('view');

    }).fail(function (XMLHttpRequest, status, errorThrown) {
        $('.h404').addClass('view');
    });
</script>

<style>
    * {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100vh;
    }

    iframe {
        border: none;
        width: 100%;
        height: 100%;
    }

    .h404 {
        position: fixed;
        background-color: white;
        z-index: -10000;
        opacity: 0%;
        height: auto;
        width: auto;
    }

    .view {
        z-index: 100;
        opacity: 100%;
    }
</style>

<body>
    <p class="h404">
        404 Not Found
        <br>
        存在しないパスを指定しているようです
    </p>
    <iframe src="/index.html" frameborder="0"></iframe>
</body>

</html>
