<!DOCTYPE html>

<html lang="ja-JP">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <meta name="theme-color" content="#ffffff">
        <meta property="og:type" content="article"/>
        <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
        <link rel="manifest" crossorigin="use-credentials" href="https://chainsawsteel1.github.io/pwasystem/manifest.json">    
        <title>非公式TKNGHサービスリスト</title>    
    </head>

    <script>
        if (typeof navigator.serviceWorker !== 'undefined') {
          navigator.serviceWorker.register('/pwasystem/sw.js')
        }
    </script>

    <style>
        /* フォント */
        @import url('https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap');
        body {
            background-image: url("");
            font-family: 'Sawarabi Mincho', serif;
            margin: auto;
            width: 450px;
            background-color: black;
            text-align: center;
            color: aliceblue;
        }
        img {
            border-radius: 10px;
            transition: .1s ease-in-out;
        }
        img:hover {
            border-radius: 0px;
        }
        .top {
            margin-top: 10%;
        }
        /* 検索BOX */
        .search {
            background-color: gainsboro;
            border-radius: 20px;
            position: fixed;
            top: 40%;
            transition: .1s ease-in-out;
        }
        .search:hover {
            border-radius: 0px;
        }
        /* ボタン関連 */
        .button-gp {
            position: fixed;
            bottom: 20%;
            width: 100%;
        }
        .button {
            float: left;
            border-radius: 20px;
            background: gainsboro;
            height: 100px;
            width: 100px;
            transition: .1s ease-in-out;
        }
        .button:hover {
            border-radius: 0px;
        }
        /* 間隔 */
        .padd {
            float: left;
            padding: 35px;
        }
    </style>

    <body>
        <div class="top">
            <a href="https://tkngh.jp/" target="_blank"><img src="https://m.tkngh.jp/files/ed7ab7c6-0b5a-4fa0-8c08-f40afb8ec8ea" alt="tkngh" width="50px" height="50px"></a>
            <h1>非公式<br>TKNGHサービスリスト</h1>
        </div>

        <div class="search">
            <form method="get" action="http://www.google.co.jp/search" target="_blank">
                <input type="text" name="q" size="25%" maxlength="255" value="">
                <input type="submit" name="btng" value="検索">
                <input type="hidden" name="hl" value="ja">
            </form>
        </div>

        <div class="button-gp">
            <div class="button">
                <a href="https://m.tkngh.jp" target="_blank"><img src="https://raw.githubusercontent.com/misskey-dev/assets/main/icon.png" alt="misskeyicon" width="100px" height="100px"></a>
            </div>
    
            <div class="padd"></div>
    
            <div class="button">
                <a href="https://movie.tkngh.jp" target="_blank"><img src="https://joinpeertube.org/img/peertube-logo-background.svg" alt="peertubeicon" width="100px" height="100px"></a>
            </div>
            
            <div class="padd"></div>
    
            <div class="button">
                <a href="https://cloud.tkngh.jp" target="_blank"><img src="https://nextcloud.com/wp-content/uploads/2022/10/nextcloud-logo-blue-transparent.svg" alt="nextcloudicon" width="100px" height="100px"></a>
            </div>
        </div>
    </body>
</html>
